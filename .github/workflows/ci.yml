name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

# Annule les exécutions précédentes encore en cours sur la même réf.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate rapide sur chaque push (dev inclus) : typecheck + lint, sans base de
  # données ni tests. Feedback en quelques secondes.
  check:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # npm ci déclenche le postinstall `prisma generate` (Node ≥ 18 requis).
      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # Gate dur : la compilation TypeScript doit passer.
      - name: Typecheck
        run: npx tsc --noEmit

      # Non bloquant pour l'instant : le code legacy porte une dette ESLint
      # préexistante (entités non échappées, effets, vars inutilisées). On
      # remonte les problèmes sans rougir la CI ; à durcir une fois la dette purgée.
      - name: Lint
        run: npm run lint
        continue-on-error: true

  # Tests d'intégration + couverture + SonarCloud : uniquement pour les
  # changements destinés à main (release). Se déclenche sur un push direct sur
  # main OU une pull request ciblant main — pas sur les push dev du quotidien.
  test:
    name: Tests & SonarCloud
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'

    # Base Postgres jetable pour les tests d'intégration. Le harnais crée la base
    # « erp_test » à partir de la base de maintenance « postgres » puis y pousse
    # le schéma Prisma (cf. tests/integration/globalSetup.ts).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Lu en priorité par le harnais et la config Vitest (jamais la prod Neon).
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/erp_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/erp_test
      # Clé de test pour le chiffrement au repos (IBAN/BIC, tokens) — base CI
      # jetable, aucun rapport avec la clé de prod sur Vercel.
      ENCRYPTION_KEY: "cWzbKloKJh7rEyXDeDF3pz+qCRzmM8ok8nnuN1V7Ia0="

    steps:
      - uses: actions/checkout@v5
        with:
          # Historique complet requis par SonarCloud (détection du "new code" + blame)
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # Lance unit + intégration avec couverture (lcov pour SonarCloud).
      - name: Tests (unit + integration) + coverage
        run: npm run test:coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: warn

      # Analyse SonarCloud (config dans sonar-project.properties) — consomme le
      # lcov produit juste au-dessus. Analyse CI uniquement : l'Automatic
      # Analysis est désactivée côté SonarCloud (conflit sinon).
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
