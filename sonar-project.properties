sonar.projectKey=PierrePocheron_erp-freelance
sonar.organization=pierrepocheron

sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Client Prisma généré — ni analysé, ni compté en duplication
sonar.exclusions=src/generated/**

# Couverture vitest (générée par `npm run test:coverage` en CI)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# La couverture ne cible que la logique (lib + actions), comme vitest.config.ts —
# les composants UI/pages ne sont pas instrumentés, on ne les compte pas "à 0 %".
sonar.coverage.exclusions=src/components/**,src/app/**,src/hooks/**
